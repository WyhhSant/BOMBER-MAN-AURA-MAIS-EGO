<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bomberman Definitivo – Multiplayer & Bot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Arial', sans-serif;
      user-select: none;
    }
    #container {
      position: relative;
      border: 4px solid #e94560;
      box-shadow: 0 0 40px rgba(233,69,96,0.6);
      border-radius: 12px;
      overflow: hidden;
    }
    canvas { display: block; }
    /* Menu */
    #menu, #gameOver {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.92);
      color: white;
      padding: 2rem;
      border-radius: 16px;
      text-align: center;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-width: 300px;
    }
    #menu button, #gameOver button {
      padding: 0.8rem 1.5rem;
      font-size: 1.1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      background: #e94560;
      color: white;
    }
    #menu button:hover, #gameOver button:hover {
      background: #ff6b81;
      transform: scale(1.05);
    }
    #gameOver { display: none; }
    .hud {
      position: absolute;
      top: 10px; left: 10px;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 10;
      display: flex;
      gap: 20px;
    }
    .hud span { font-weight: bold; }
    #timerDisplay {
      position: absolute;
      top: 10px; right: 10px;
      color: #fdcb6e;
      background: rgba(0,0,0,0.7);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 10;
    }
    #instructions {
      position: absolute;
      bottom: 10px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="container">
  <canvas id="gameCanvas"></canvas>
  <div class="hud" id="hud">
    <span style="color:#00b894;">P1: 💣<span id="b1">1</span> 🔥<span id="r1">1</span> ⚡<span id="s1">1</span></span>
    <span style="color:#0984e3;">P2: 💣<span id="b2">1</span> 🔥<span id="r2">1</span> ⚡<span id="s2">1</span></span>
  </div>
  <div id="timerDisplay">⏱️ <span id="timerText">0</span>s</div>
  <div id="instructions"></div>

  <!-- Menu inicial -->
  <div id="menu">
    <h2>💣 BOMBERMAN</h2>
    <button id="btnMulti">⚔️ 2 Jogadores Local</button>
    <button id="btnBot">🤖 vs Bot (IA)</button>
    <button id="btnRecords">🏆 Recordes</button>
  </div>

  <!-- Tela de Game Over -->
  <div id="gameOver">
    <h2 id="winnerText"></h2>
    <button id="restartBtn">Revanche / Menu</button>
  </div>
</div>

<script>
  (function() {
    // ========== CONFIGURAÇÃO ==========
    const COLS = 17;
    const ROWS = 13;
    const CELL = 36;
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = COLS * CELL;
    canvas.height = ROWS * CELL;

    const EMPTY = 0, WALL = 1, BRICK = 2;

    // Elementos UI
    const menuDiv = document.getElementById('menu');
    const gameOverDiv = document.getElementById('gameOver');
    const winnerText = document.getElementById('winnerText');
    const timerText = document.getElementById('timerText');
    const instructionsDiv = document.getElementById('instructions');
    const hudDiv = document.getElementById('hud');
    const btnMulti = document.getElementById('btnMulti');
    const btnBot = document.getElementById('btnBot');
    const btnRecords = document.getElementById('btnRecords');
    const restartBtn = document.getElementById('restartBtn');

    // ========== ÁUDIO (Web Audio API) ==========
    let audioCtx = null;
    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function playBeep(freq, duration, type = 'square', vol = 0.1) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = vol;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      setTimeout(() => { osc.stop(); }, duration);
    }
    function sfxBomb() { playBeep(150, 200, 'sawtooth', 0.15); }
    function sfxExplosion() { playBeep(60, 300, 'square', 0.2); }
    function sfxPowerUp() { playBeep(600, 100, 'sine', 0.1); playBeep(800, 100, 'sine', 0.1); }
    function sfxKick() { playBeep(200, 80, 'triangle', 0.1); }
    function sfxDeath() { playBeep(100, 400, 'sawtooth', 0.3); }

    // ========== PARTÍCULAS ==========
    let particles = [];
    class Particle {
      constructor(x, y, color, life = 20) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 4;
        this.vy = (Math.random() - 0.5) * 4 - 2;
        this.life = life;
        this.maxLife = life;
        this.color = color;
      }
      update() { this.x += this.vx; this.y += this.vy; this.life--; }
      draw(ctx) {
        const alpha = this.life / this.maxLife;
        ctx.fillStyle = `rgba(${this.color},${alpha})`;
        ctx.fillRect(this.x-2, this.y-2, 4, 4);
      }
    }
    function spawnParticles(x, y, count, color = '255,165,0') {
      for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color, 15 + Math.random() * 15));
    }

    // ========== JOGADOR ==========
    class Player {
      constructor(id, x, y, color, controls) {
        this.id = id; this.x = x; this.y = y; this.color = color; this.controls = controls;
        this.maxBombs = 1; this.bombsPlaced = 0; this.explosionRange = 1;
        this.alive = true; this.moveCooldown = 0; this.invincible = 60;
        this.speed = 1; this.kick = false; this.remoteBomb = null; // referência para bomba remota
      }
    }

    class Bomb {
      constructor(x, y, owner, range, remote = false) {
        this.x = x; this.y = y; this.owner = owner; this.range = range;
        this.timer = 150; // ~2.5 segundos a 60fps
        this.remote = remote; // bomba remota não explode sozinha
        this.moving = false; this.vx = 0; this.vy = 0;
      }
    }

    // ========== ESTADO DO JOGO ==========
    let grid, players, bombs, explosions, powerUps, gameRunning, gameMode;
    let frame = 0, deathMatchTimer = 0;
    const MAX_TIME = 120; // segundos para morte súbita

    function initGrid() {
      grid = Array(ROWS).fill().map(() => Array(COLS).fill(EMPTY));
      // Paredes indestrutíveis (padrão xadrez)
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (r % 2 === 0 && c % 2 === 0) grid[r][c] = WALL;
        }
      }
      // Bordas indestrutíveis
      for (let c = 0; c < COLS; c++) { grid[0][c] = WALL; grid[ROWS-1][c] = WALL; }
      for (let r = 0; r < ROWS; r++) { grid[r][0] = WALL; grid[r][COLS-1] = WALL; }
      // Blocos destrutíveis (evitando áreas de spawn)
      const safe = [[1,1],[1,2],[2,1],[COLS-2,ROWS-2],[COLS-3,ROWS-2],[COLS-2,ROWS-3]];
      for (let r = 1; r < ROWS-1; r++) {
        for (let c = 1; c < COLS-1; c++) {
          if (grid[r][c] === EMPTY) {
            if (!safe.some(s => s[0]===c && s[1]===r) && Math.random() < 0.6) {
              grid[r][c] = BRICK;
            }
          }
        }
      }
    }

    function resetGame(mode) {
      initAudio();
      gameMode = mode;
      initGrid();
      players = [];
      bombs = [];
      explosions = [];
      powerUps = [];
      particles = [];
      frame = 0;
      deathMatchTimer = MAX_TIME * 60;
      gameRunning = true;

      // Jogador 1
      const p1 = new Player(1, 1, 1, '#00b894', {
        up:'KeyW', down:'KeyS', left:'KeyA', right:'KeyD', bomb:'Space', remote:'KeyF', kick:'KeyR'
      });
      players.push(p1);

      if (mode === 'multi') {
        const p2 = new Player(2, COLS-2, ROWS-2, '#0984e3', {
          up:'ArrowUp', down:'ArrowDown', left:'ArrowLeft', right:'ArrowRight',
          bomb:'Enter', remote:'ShiftRight', kick:'Period'
        });
        players.push(p2);
        instructionsDiv.textContent = 'P1: WASD+Espaço | P2: Setas+Enter | F/Shift = Bomba Remota';
      } else {
        // Bot
        const bot = new Player(2, COLS-2, ROWS-2, '#0984e3', {});
        bot.isBot = true;
        players.push(bot);
        instructionsDiv.textContent = 'P1: WASD+Espaço | F = Bomba Remota';
      }

      updateHUD();
      menuDiv.style.display = 'none';
      gameOverDiv.style.display = 'none';
    }

    // ========== COLISÕES ==========
    function isSolid(x, y, ignoreBombs = false) {
      if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return true;
      if (grid[y][x] !== EMPTY) return true;
      if (!ignoreBombs && bombs.some(b => b.x === x && b.y === y)) return true;
      return false;
    }

    function canMoveTo(x, y, player, ignoreBombs = false) {
      if (isSolid(x, y, ignoreBombs)) return false;
      // Colisão com outros jogadores
      if (players.some(p => p !== player && p.alive && p.x === x && p.y === y)) return false;
      return true;
    }

    // ========== BOMBAS ==========
    function placeBomb(player) {
      if (!player.alive) return;
      if (player.bombsPlaced >= player.maxBombs) return;
      if (bombs.some(b => b.x === player.x && b.y === player.y)) return;
      const bomb = new Bomb(player.x, player.y, player, player.explosionRange, false);
      bombs.push(bomb);
      player.bombsPlaced++;
      sfxBomb();
    }

    function placeRemoteBomb(player) {
      if (!player.alive) return;
      if (player.remoteBomb) return; // já tem uma ativa
      if (player.bombsPlaced >= player.maxBombs) return;
      const bomb = new Bomb(player.x, player.y, player, player.explosionRange, true);
      bombs.push(bomb);
      player.remoteBomb = bomb;
      player.bombsPlaced++;
      sfxBomb();
    }

    function detonateRemote(player) {
      if (player.remoteBomb) {
        explodeBomb(player.remoteBomb);
        bombs = bombs.filter(b => b !== player.remoteBomb);
        player.remoteBomb = null;
        player.bombsPlaced--;
      }
    }

    function kickBomb(player) {
      // Procura bomba na posição do jogador
      const bomb = bombs.find(b => b.x === player.x && b.y === player.y);
      if (bomb && !bomb.moving) {
        const dir = player.facing || {x:1, y:0}; // último movimento
        bomb.vx = dir.x; bomb.vy = dir.y;
        bomb.moving = true;
        sfxKick();
      }
    }

    function explodeBomb(bomb) {
      const {x, y, range} = bomb;
      addExplosion(x, y);
      sfxExplosion();
      const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
      dirs.forEach(([dx,dy]) => {
        for (let i=1; i<=range; i++) {
          const nx = x+dx*i, ny = y+dy*i;
          if (nx<0||nx>=COLS||ny<0||ny>=ROWS) break;
          if (grid[ny][nx] === WALL) break;
          if (grid[ny][nx] === BRICK) {
            grid[ny][nx] = EMPTY;
            spawnParticles(nx*CELL+CELL/2, ny*CELL+CELL/2, 12, '210,180,140');
            if (Math.random() < 0.35) spawnPowerUp(nx, ny);
            addExplosion(nx, ny);
            break;
          }
          addExplosion(nx, ny);
        }
      });
      // Remove bomba do dono
      if (bomb.owner) {
        bomb.owner.bombsPlaced = Math.max(0, bomb.owner.bombsPlaced-1);
        if (bomb.owner.remoteBomb === bomb) bomb.owner.remoteBomb = null;
      }
    }

    function addExplosion(x, y) {
      if (!explosions.some(e => e.x===x && e.y===y)) {
        explosions.push({x,y,timer:25});
        spawnParticles(x*CELL+CELL/2, y*CELL+CELL/2, 8, '255,100,0');
      }
    }

    function spawnPowerUp(x, y) {
      const types = ['bomb','range','speed','kick','remote'];
      const weights = [0.35, 0.30, 0.15, 0.10, 0.10];
      let r = Math.random();
      let type = 'bomb';
      let cumulative = 0;
      for (let i=0; i<types.length; i++) {
        cumulative += weights[i];
        if (r <= cumulative) { type = types[i]; break; }
      }
      powerUps.push({x,y,type});
    }

    // ========== MORTE SÚBITA ==========
    function deathMatchWalls() {
      // A cada segundo após o timer, derruba blocos das bordas
      if (deathMatchTimer > 0) return;
      const step = Math.floor((-deathMatchTimer) / 30); // a cada 30 frames (0.5s) uma linha
      const side = step % 4; // 0:top,1:right,2:bottom,3:left
      const layer = Math.floor(step/4);
      // Aplica uma linha de paredes indestrutíveis vindo das bordas
      if (layer < 3) {
        for (let i=0; i<COLS; i++) {
          if (side===0 && layer<ROWS-1) grid[layer+1][i] = WALL;
          if (side===2 && ROWS-2-layer>=0) grid[ROWS-2-layer][i] = WALL;
        }
        for (let i=0; i<ROWS; i++) {
          if (side===1 && COLS-2-layer>=0) grid[i][COLS-2-layer] = WALL;
          if (side===3 && layer+1<COLS-1) grid[i][layer+1] = WALL;
        }
      }
    }

    // ========== BOT IA ==========
    function updateBot(bot) {
      if (!bot.alive || !gameRunning) return;
      // Evita explosões
      const danger = explosions.some(e => e.x===bot.x && e.y===bot.y) ||
                     bombs.some(b => {
                       const dx = Math.abs(b.x - bot.x);
                       const dy = Math.abs(b.y - bot.y);
                       return (dx===0 && dy<=b.range) || (dy===0 && dx<=b.range);
                     });
      // Foge de perigo ou coloca bomba perto de blocos
      if (danger) {
        // move para direção segura aleatória
        const safeDirs = [];
        [[1,0],[-1,0],[0,1],[0,-1]].forEach(([dx,dy]) => {
          if (canMoveTo(bot.x+dx, bot.y+dy, bot)) safeDirs.push({x:dx,y:dy});
        });
        if (safeDirs.length>0) {
          const d = safeDirs[Math.floor(Math.random()*safeDirs.length)];
          bot.x += d.x; bot.y += d.y;
          bot.facing = d;
        }
      } else {
        // Comportamento ofensivo
        if (Math.random() < 0.02 && bot.bombsPlaced < bot.maxBombs) {
          placeBomb(bot);
        } else if (Math.random() < 0.03 && bot.remoteBomb) {
          detonateRemote(bot);
        } else {
          // Move aleatoriamente, preferindo direção atual
          const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
          const valid = dirs.filter(([dx,dy]) => canMoveTo(bot.x+dx, bot.y+dy, bot));
          if (valid.length>0) {
            const d = valid[Math.floor(Math.random()*valid.length)];
            bot.x += d.x; bot.y += d.y;
            bot.facing = d;
          }
        }
      }
      bot.moveCooldown = 5; // bot mais lento
    }

    // ========== ATUALIZAÇÃO PRINCIPAL ==========
    function update() {
      if (!gameRunning) return;
      frame++;
      if (deathMatchTimer > 0) deathMatchTimer--;
      else if (frame % 30 === 0) deathMatchWalls();

      // Atualiza partículas
      particles = particles.filter(p => { p.update(); return p.life > 0; });

      // Atualiza bombas (movimento e timer)
      for (let i=bombs.length-1; i>=0; i--) {
        const b = bombs[i];
        if (b.moving) {
          const nx = b.x + b.vx, ny = b.y + b.vy;
          if (!isSolid(nx, ny, true)) {
            b.x = nx; b.y = ny;
          } else {
            b.vx = 0; b.vy = 0; b.moving = false;
          }
        }
        if (!b.remote) {
          b.timer--;
          if (b.timer <= 0) {
            explodeBomb(b);
            bombs.splice(i,1);
          }
        }
      }

      // Explosões
      for (let i=explosions.length-1; i>=0; i--) {
        explosions[i].timer--;
        if (explosions[i].timer <= 0) explosions.splice(i,1);
      }

      // Jogadores
      players.forEach(p => {
        if (!p.alive) return;
        if (p.invincible > 0) p.invincible--;
        if (p.moveCooldown > 0) p.moveCooldown--;

        if (p.isBot) {
          if (frame % 10 === 0) updateBot(p);
        } else {
          // Movimento via teclas (processado no gameLoop)
        }
      });

      // Verifica jogadores em explosões
      players.forEach(p => {
        if (!p.alive || p.invincible>0) return;
        if (explosions.some(e => e.x===p.x && e.y===p.y)) {
          p.alive = false;
          spawnParticles(p.x*CELL+CELL/2, p.y*CELL+CELL/2, 20, '255,0,0');
          sfxDeath();
        }
      });

      // Verifica vitória
      const alive = players.filter(p => p.alive);
      if (alive.length === 0) endGame('Empate!');
      else if (alive.length === 1 && players.length > 1) endGame(`Jogador ${alive[0].id} venceu!`);

      updateHUD();
      timerText.textContent = Math.max(0, Math.ceil(deathMatchTimer/60));
    }

    // ========== INPUT ==========
    const keys = {};
    window.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code.startsWith('Arrow') || e.code === 'Space' || e.code === 'Enter') e.preventDefault();
      // Ações instantâneas
      if (gameRunning) {
        players.forEach(p => {
          if (p.isBot || !p.alive) return;
          if (e.code === p.controls.bomb) placeBomb(p);
          if (e.code === p.controls.remote) {
            if (p.remoteBomb) detonateRemote(p); else placeRemoteBomb(p);
          }
          if (e.code === p.controls.kick) kickBomb(p);
        });
      }
    });
    window.addEventListener('keyup', e => { keys[e.code] = false; });

    function processPlayerInput(p) {
      if (!p.alive || p.isBot) return;
      if (p.moveCooldown > 0) return;
      let dx=0, dy=0;
      if (keys[p.controls.up]) dy = -1;
      else if (keys[p.controls.down]) dy = 1;
      else if (keys[p.controls.left]) dx = -1;
      else if (keys[p.controls.right]) dx = 1;
      if (dx !== 0 || dy !== 0) {
        p.facing = {x:dx, y:dy};
        const steps = p.speed || 1;
        for (let s=0; s<steps; s++) {
          const nx = p.x + dx, ny = p.y + dy;
          if (canMoveTo(nx, ny, p)) {
            p.x = nx; p.y = ny;
            // Coleta power-up
            const puIdx = powerUps.findIndex(pu => pu.x===p.x && pu.y===p.y);
            if (puIdx !== -1) {
              const pu = powerUps[puIdx];
              if (pu.type === 'bomb') p.maxBombs++;
              else if (pu.type === 'range') p.explosionRange++;
              else if (pu.type === 'speed') p.speed = Math.min(p.speed+1, 3);
              else if (pu.type === 'kick') p.kick = true;
              else if (pu.type === 'remote') { /* já tratado */ }
              powerUps.splice(puIdx, 1);
              sfxPowerUp();
            }
          } else break;
        }
        p.moveCooldown = 6;
      }
    }

    function updateHUD() {
      const p1 = players[0], p2 = players[1];
      if (p1) {
        document.getElementById('b1').textContent = p1.maxBombs - p1.bombsPlaced;
        document.getElementById('r1').textContent = p1.explosionRange;
        document.getElementById('s1').textContent = p1.speed;
      }
      if (p2) {
        document.getElementById('b2').textContent = p2.maxBombs - p2.bombsPlaced;
        document.getElementById('r2').textContent = p2.explosionRange;
        document.getElementById('s2').textContent = p2.speed;
      }
    }

    function endGame(msg) {
      gameRunning = false;
      winnerText.innerHTML = msg;
      gameOverDiv.style.display = 'block';
      // Salva recorde (simples)
      const record = parseInt(localStorage.getItem('bombermanWins')||'0') + 1;
      localStorage.setItem('bombermanWins', record);
    }

    // ========== RENDERIZAÇÃO ==========
    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      // Fundo
      ctx.fillStyle = '#1e272e';
      ctx.fillRect(0,0,canvas.width,canvas.height);

      // Grid
      for (let r=0; r<ROWS; r++) {
        for (let c=0; c<COLS; c++) {
          const x=c*CELL, y=r*CELL;
          if (grid[r][c] === WALL) {
            ctx.fillStyle = '#485460';
            ctx.fillRect(x+1,y+1,CELL-2,CELL-2);
            ctx.strokeStyle = '#808e9b';
            ctx.lineWidth = 1;
            ctx.strokeRect(x+1,y+1,CELL-2,CELL-2);
          } else if (grid[r][c] === BRICK) {
            ctx.fillStyle = '#d2dae2';
            ctx.fillRect(x+2,y+2,CELL-4,CELL-4);
            ctx.fillStyle = '#808e9b';
            ctx.fillRect(x+4,y+4,CELL-8,CELL-8);
          }
        }
      }

      // Power-ups
      powerUps.forEach(pu => {
        const cx = pu.x*CELL+CELL/2, cy = pu.y*CELL+CELL/2;
        ctx.save();
        ctx.translate(cx, cy);
        const colors = {bomb:'#fdcb6e', range:'#ff7675', speed:'#55efc4', kick:'#ffeaa7', remote:'#a29bfe'};
        ctx.fillStyle = colors[pu.type] || '#fff';
        ctx.beginPath(); ctx.arc(0,0,CELL/3,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        const symbols = {bomb:'B', range:'R', speed:'S', kick:'K', remote:'📡'};
        ctx.fillText(symbols[pu.type]||'?', 0, 1);
        ctx.restore();
      });

      // Bombas
      bombs.forEach(b => {
        const x = b.x*CELL+CELL/2, y = b.y*CELL+CELL/2;
        ctx.fillStyle = b.remote ? '#a29bfe' : '#2d3436';
        ctx.beginPath(); ctx.arc(x,y,CELL/3,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#e17055'; ctx.lineWidth=2; ctx.stroke();
        if (b.timer < 90 && Math.floor(b.timer/15)%2) {
          ctx.fillStyle = 'rgba(255,0,0,0.4)'; ctx.beginPath(); ctx.arc(x,y,CELL/2.5,0,Math.PI*2); ctx.fill();
        }
      });

      // Explosões
      explosions.forEach(e => {
        ctx.fillStyle = `rgba(255,120,0,${e.timer/25})`;
        ctx.fillRect(e.x*CELL, e.y*CELL, CELL, CELL);
      });

      // Partículas
      particles.forEach(p => p.draw(ctx));

      // Jogadores
      players.forEach(p => {
        if (!p.alive) return;
        const x = p.x*CELL+CELL/2, y = p.y*CELL+CELL/2;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(x,y,CELL/3,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth=2; ctx.stroke();
        // Olhos
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(x-4,y-3,4,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(x+4,y-3,4,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(x-4,y-3,2,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(x+4,y-3,2,0,Math.PI*2); ctx.fill();
      });
    }

    // ========== LOOP ==========
    function gameLoop() {
      // Processa input dos jogadores
      if (gameRunning) {
        players.forEach(p => { if (!p.isBot) processPlayerInput(p); });
        update();
      }
      draw();
      requestAnimationFrame(gameLoop);
    }

    // ========== MENU E BOTÕES ==========
    btnMulti.addEventListener('click', () => resetGame('multi'));
    btnBot.addEventListener('click', () => resetGame('bot'));
    btnRecords.addEventListener('click', () => {
      alert(`Vitórias totais: ${localStorage.getItem('bombermanWins')||0}`);
    });
    restartBtn.addEventListener('click', () => {
      gameOverDiv.style.display = 'none';
      menuDiv.style.display = 'flex';
    });

    // Iniciar
    gameLoop();
  })();
</script>
</body>
</html>
